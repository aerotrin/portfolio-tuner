# Symbol Configuration for Portfolio Tuner

# HOW TO USE THIS FILE
# - Add or remove symbols in each group as needed.
# - Only use ticker symbols supported by your data provider (e.g. Financial Modeling Prep).
# - To specify a non-US exchange, add its suffix code to the symbol. Currently supported: .TO (Toronto).
# - Keep in mind: more symbols = slower refreshes. Check your subscription's API limits before bulk adding symbols.

# Required ------------------------------
benchmarks:
  label: Benchmarks
  symbols:
    - ^GSPC
    - ^IXIC
    - ^DJI
    - ^GSPTSE


snapshot:
  label: Market Snapshot
  symbols:
    - ^GSPC
    - ^IXIC
    - ^DJI
    - ^GSPTSE
    - ^VIX


