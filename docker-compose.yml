version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: portfolio-tuner-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_URL: sqlite:////data/app.db
    volumes:
      - backend_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8000/docs'').read()"',
        ]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s

    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: portfolio-tuner-frontend
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      BACKEND_URL: http://backend:8000
      CONFIG_DIR: /app/config
      DEBUG: false
    volumes:
      - ./config:/app/config:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend_data:
