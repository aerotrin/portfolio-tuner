# Symbol Configuration for Portfolio Tuner

# HOW TO USE THIS FILE
# - Add or remove symbols in each group's symbols: list as needed.
# - Only use ticker symbols supported by your data provider (Financial Modeling Prep).
#   See: https://site.financialmodelingprep.com/developer/docs/stable/search-symbol to look up symbols.
# - Include only symbols you have access to with your subscription.
# - To specify an exchange, add its code to the symbol (e.g., .TO for Toronto; only .TO is supported).
# - To comment out (disable) a symbol, start the line with #.
# - Keep in mind: more symbols = slower refreshes.
# - Check your subscription's API limits before adding many symbols.

# Required ------------------------------
benchmarks:
  label: Benchmarks
  symbols:
    - ^GSPC
    - ^IXIC
    - ^DJI
    - XIC.TO  # substitute for ^GSPTSE
    - ^VIX
